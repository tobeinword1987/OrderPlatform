services:

  app:
    image: order-platform-prod-distroless-runner
    # image: order-platform-prod-runner
    build:
      context: .
      dockerfile: Dockerfile
      target: prod-distroless
      # target: prod
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - backend

  migrate:
    image: migrate
    build:
      context: .
      dockerfile: Dockerfile
      target: migrations
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=liudmyla
      - DB_PASSWORD=liudmyla
      - DB_NAME=liudmyla
      - NODE_ENV=prod
    networks:
      - backend
    volumes:
      - ./src/migrations:/app/src/migrations
      - ./src/seeds:/app/src/seeds
    links:
      - postgres
    depends_on:
      - postgres
      - app

  seed:
    image: seed
    build:
      context: .
      dockerfile: Dockerfile
      target: seeds
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=liudmyla
      - DB_PASSWORD=liudmyla
      - DB_NAME=liudmyla
      - NODE_ENV=prod
    networks:
      - backend
    volumes:
      - ./src/migrations:/app/src/migrations
      - ./src/seeds:/app/src/seeds
    depends_on:
      - migrate
      - app

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: liudmyla
      POSTGRES_PASSWORD: liudmyla
      POSTGRES_DB: liudmyla
    networks:
      - backend
    volumes:
      - ./pgdata_files_module:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - backend
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_files_module:/data
    depends_on:
      - postgres

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
      - postgres
    restart: 'no'
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${AWS_S3_BUCKET:-files-private};
      mc anonymous set none local/${AWS_S3_BUCKET:-files-private};
      echo 'minio bucket is ready';
      "

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=user1
      - RABBITMQ_DEFAULT_PASS=pass1
    networks:
      - backend
    healthcheck:
        test: rabbitmq-diagnostics -q check_running
        interval: 3s
        timeout: 10s
        retries: 5
    ports:
      - "5673:5672"
      - "15673:15672"

  payments-grpc:
    image: node:22-alpine
    working_dir: /app
    networks:
      - backend
    volumes:
      - ./:/app
    ports:
      - "5021:5021"
    command: sh -c "corepack enable && npm install && npm run start:payments:dev"

volumes:
  pgdata_files_module:
  minio_files_module:

networks:
  backend: {}
