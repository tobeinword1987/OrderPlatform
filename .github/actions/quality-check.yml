name: Quality checks
description: Install dependencies and run lesson 16 project verification steps.

inputs:
  run-integration-test:
    description: Whether to run integration test validation.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Typecheck
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm typecheck

    - name: Unit tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm test

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm build

    - name: Smoke validation
      if: ${{ inputs.run-smoke == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm smoke
