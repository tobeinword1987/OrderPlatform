name: Integration tests
description: Run integration tests

on:
  workflow_call:
    inputs:
      environment:
        description: current environment
        required: false
        type: string
        default: dev
      dockerFile:
        description: dockerfile
        required: true
        type: string
      serviceName:
        description: Name of service
        required: true
        type: string
      short_sha:
        description: "short_sha"
        required: true
        type: string
      verifyResult:
        description: "Result of verify"
        required: true
        type: string
      contextResult:
        description: "Result of context"
        required: true
        type: string

jobs:
  push_to_registry:
    name: Build and push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to  Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ${{ inputs.dockerFile }}
          push: true
          tags: "liudmylapopova/${{ inputs.serviceName }}:${{ needs.context.outputs.short_sha }}"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/liudmylapopova/${{ inputs.serviceName }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - context
      - verify
      - push_to_registry
    steps:
      - name: Publish final summary
        run: |
          {
            echo "## Final status"
            echo "- Context: ${{ inputs.contextResult }}"
            echo "- Verify: ${{ inputs.verifyResult }}"
            echo "- Push to registry: ${{ needs.push_to_registry.result }}"
            echo "- Image tag: ${{ inputs.serviceName }}:${{ inputs.short_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
