name: Node.js CI

on: [push]

concurrency:
  group: lesson16-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  PROJECT_DIR: "./"

defaults:
  run:
    shell: bash

jobs:
  context:
    name: Context / trigger metadata
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Print trigger context
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "actor=${GITHUB_ACTOR}"
          echo "note=${{ github.event.inputs.note || 'n/a' }}"

      - id: meta
        name: Compute metadata
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Write context summary
        run: |
          {
            echo "## Lesson 16 quality gate"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA::7}"
            echo "- Project: ${PROJECT_DIR}"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: 'Verify -> eslint -> Uts'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm run lint
      - run: npm run test

  docker_preview:
    name: Docker preview build
    runs-on: ubuntu-latest
    needs:
      - context
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.PROJECT_DIR }}
          push: false
          tags: homework16/orders-api-on-minikube:${{ needs.context.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: liudmylapopova/orders_api:v1

      - name: print what I have
        run: |
          echo "${{ steps.meta.outputs.tags }}${{ steps.meta.outputs.labels }}"

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/liudmylapopova/orders_api:v1
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - context
      - verify
      - docker_preview
    steps:
      - name: Publish final summary
        run: |
          {
            echo "## Final status"
            echo "- Context: ${{ needs.context.result }}"
            echo "- Verify: ${{ needs.verify.result }}"
            echo "- Docker preview: ${{ needs.docker_preview.result }}"
            echo "- Image tag: homework16/orders-api-on-minikube:${{ needs.context.outputs.short_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
