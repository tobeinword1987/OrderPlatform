name: Order API

on: [push]

concurrency:
  group: orders_api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PROJECT_DIR: "./"

defaults:
  run:
    shell: bash

jobs:
  context:
    name: Context / trigger metadata
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Print trigger context
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "actor=${GITHUB_ACTOR}"
          echo "note=${{ github.event.inputs.note || 'n/a' }}"

      - id: meta
        name: Compute metadata
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Write context summary
        run: |
          {
            echo "## orders_api quality checks, build and push image"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA::7}"
            echo "- Project: ${PROJECT_DIR}"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: 'Verify -> eslint -> Uts'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm run lint
      - run: npm run test

  integration:
    runs-on: ubuntu-latest
    needs:
      - context
      - verify
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        env:
          MINIO_EXT_PORT: ${{ vars.MINIO_EXT_PORT }}
          MINIO_INT_PORT: ${{ vars.MINIO_INT_PORT }}
          MINIO_UI_EXT_PORT: ${{ vars.MINIO_UI_EXT_PORT }}
          MINIO_UI_INT_PORT: ${{ vars.MINIO_UI_INT_PORT }}
          RABBITMQ_EXT_PORT: ${{ vars.RABBITMQ_EXT_PORT }}
          RABBITMQ_INT_PORT: ${{ vars.RABBITMQ_INT_PORT }}
          RABBITMQ_UI_EXT_PORT: ${{ vars.RABBITMQ_UI_EXT_PORT }}
          RABBITMQ_UI_INT_PORT: ${{ vars.RABBITMQ_UI_INT_PORT }}
          GRPC_BIND_PORT: ${{ vars.GRPC_BIND_PORT }}
          PORT: ${{ vars.PORT }}
          BASE_URL: ${{ secrets.BASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          STRATEGY: ${{ secrets.STRATEGY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_FORCE_PATH_STYLE: ${{ secrets.AWS_S3_FORCE_PATH_STYLE }}
          FILES_PRESIGN_EXPIRES_IN_SEC: ${{ secrets.FILES_PRESIGN_EXPIRES_IN_SEC }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          RABBITMQ_PREFETCH: ${{ secrets.RABBITMQ_PREFETCH }}
          RABBITMQ_MAX_ATTEMPTS: ${{ secrets.RABBITMQ_MAX_ATTEMPTS }}
          GRPC_MIN_TIMEOUT_RESPONSE_MS: ${{ secrets.GRPC_MIN_TIMEOUT_RESPONSE_MS }}
          GRPC_MAX_TIMEOUT_RESPONSE_MS: ${{ secrets.GRPC_MAX_TIMEOUT_RESPONSE_MS }}
          GRPC_MAX_COUNT_RETRIES: ${{ secrets.GRPC_MAX_COUNT_RETRIES }}
          RABBITMQ_SIMULATE_CONSUME_ERRORS: ${{ secrets.RABBITMQ_SIMULATE_CONSUME_ERRORS }}
          PAYMENTS_GRPC_URL: ${{ secrets.PAYMENTS_GRPC_URL }}
        run: |
          docker compose -f compose.dev.yml up --build --abort-on-container-exit --exit-code-from app

      - name: Cleanup
        if: always()
        run: docker compose -f compose.dev.yml down -v

  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs:
      - context
      - verify
      - integration
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to  Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: "liudmylapopova/orders_api:${{ needs.context.outputs.short_sha }}"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/liudmylapopova/orders_api
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - context
      - verify
      - push_to_registry
    steps:
      - name: Publish final summary
        run: |
          {
            echo "## Final status"
            echo "- Context: ${{ needs.context.result }}"
            echo "- Verify: ${{ needs.verify.result }}"
            echo "- Push to registry: ${{ needs.push_to_registry.result }}"
            echo "- Image tag: orders-api:${{ needs.context.outputs.short_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
