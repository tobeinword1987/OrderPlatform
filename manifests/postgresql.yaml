# Source: postgresql/templates/primary/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-pg-postgresql
  namespace: default
  labels:
    helm.sh/chart: postgresql-0.3.3
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: my-pg
    app.kubernetes.io/version: "17.9"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: my-pg
      app.kubernetes.io/component: primary
  serviceName: my-pg-postgresql-hl
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        helm.sh/chart: postgresql-0.3.3
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: my-pg
        app.kubernetes.io/version: "17.9"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: primary
    spec:
      serviceAccountName: my-pg-postgresql
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1001
      containers:
        - name: postgresql
          image: ghcr.io/kubelauncher/postgresql@sha256:4acc861e6bc1d8f23f680c71a00ecc699a253545a2e73734ae929b095679e823
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: POSTGRESQL_PORT_NUMBER
              value: "5432"
            - name: PGPORT
              value: "5432"
            - name: POSTGRESQL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-pg-postgresql
                  key: postgres-password
            - name: POSTGRESQL_USERNAME
              value: "liudmyla"
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-pg-postgresql
                  key: password
            - name: POSTGRESQL_DATABASE
              value: "liudmyla"
            - name: POSTGRESQL_DATA_DIR
              value: /data/postgresql/data
            - name: PGDATA
              value: /data/postgresql/data
            - name: POSTGRESQL_PG_HBA
              value: "local all all trust\nhost all all 127.0.0.1/32 trust\nhost all all ::1/128 trust\nhost all all 0.0.0.0/0 md5\nhost all all ::/0 md5"
            - name: POSTGRESQL_INITDB_ARGS
              value: "--auth-host=md5"
          ports:
            - name: tcp-postgresql
              containerPort: 5432
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -h 127.0.0.1 -p 5432
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          resources:

            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data/postgresql
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: postgresql
          app.kubernetes.io/instance: my-pg
          app.kubernetes.io/component: primary
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
