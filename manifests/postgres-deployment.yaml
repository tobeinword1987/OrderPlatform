apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f compose.dev.yml convert
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: postgres
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f compose.dev.yml convert
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: postgres
    spec:
      containers:
        - name: postgres
          envFrom:
            - secretRef:
                name: app-secret
          image: postgres:16-alpine
          name: postgres
          ports:
            - containerPort: 5432
              protocol: TCP
      restartPolicy: Always
